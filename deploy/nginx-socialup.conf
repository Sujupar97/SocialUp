server {
    listen 80;
    server_name api.fullcontent.online;

    # Redirect HTTP to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # CORS headers for frontend (both domains)
        set $cors_origin '';
        if ($http_origin ~* "^https://(app\.fullcontent\.online|socialfullup\.netlify\.app)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Serve Instagram videos for publishing
    location /api/ig-videos/ {
        alias /opt/socialup/scripts/processed/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # File upload size limit (500MB for videos)
    client_max_body_size 500M;

    # Timeouts for long-running uploads
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
